<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamila Ratnayake - Premium Sinhala Lyricist Portfolio</title>
    <meta name="description" content="Official portfolio of Kamila Ratnayake, a prominent Sinhala lyricist. Explore her songs, read full Sinhala lyrics, and discover her literary archive.">
    <meta name="keywords" content="Kamila Ratnayake, Sinhala Lyrics, Lyricist, Sri Lankan Music, Songwriter">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;500;700&family=Noto+Serif+Sinhala:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <script>
        window.addEventListener('error', function(e) {
            document.body.insertAdjacentHTML('afterbegin', '<div style="background:red;color:white;padding:20px;z-index:9999;position:relative;">Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno + '</div>');
        });
        window.addEventListener('unhandledrejection', function(e) {
            document.body.insertAdjacentHTML('afterbegin', '<div style="background:red;color:white;padding:20px;z-index:9999;position:relative;">Promise Error: ' + e.reason + '</div>');
        });
    </script>
</head>
<body>
    <header class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#home" class="brand nav-link" aria-label="Kamila Ratnayake Home">
                <span class="brand-text">Kamila Ratnayake</span>
            </a>
            
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle Menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            
            <nav class="nav-links" id="navLinks">
                <a href="#home" class="nav-link">Home</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#lyrics" class="nav-link">Lyrics</a>
                <a href="#songs" class="nav-link">Songs</a>
                <a href="#awards" class="nav-link">Awards</a>
                <a href="#gallery" class="nav-link">Gallery</a>
                <a href="#contact" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Page Content Container -->
    <main id="app" class="page-transition">
        <!-- Content injected by app.js -->
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <h3 class="font-serif">Kamila Ratnayake</h3>
                <p>A Digital Literary Archive</p>
            </div>
            <div class="footer-links">
                <a href="#lyrics" class="nav-link">Lyrics Collection</a>
                <a href="#contact" class="nav-link">Get in Touch</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; <span id="currentYear"></span> Kamila Ratnayake. All rights reserved.</p>
        </div>
    </footer>

    <!-- Lyric Detail Modal -->
    <div id="lyricModal" class="modal-overlay" onclick="app.handleModalCloseClick(event)">
        <div class="modal-card">
            <button class="modal-close" onclick="app.closeLyricModal()" aria-label="Close Modal">&times;</button>
            <div id="modalLyricBody"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="pages.js"></script>
    <script src="app.js"></script>
</body>
</html>
